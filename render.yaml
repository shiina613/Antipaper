services:
  - type: web
    name: antipaper-api-shiina613
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: python -m src --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PROCESSING_DEADLINE_SECONDS
        value: "180"
      - key: OPENAI_API_KEY
        sync: false
